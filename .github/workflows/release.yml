name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Get version from tag
        id: get_version
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        shell: pwsh
        run: |
          pytest tests/ -v --tb=short

      - name: Build executable
        shell: pwsh
        env:
          PYTHONUTF8: "1"
        run: |
          python build.py --version ${{ steps.get_version.outputs.version }}

      - name: Generate release notes
        id: release_notes
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          $version = $env:APP_VERSION
          $notes = @"
          ## 小黑 - 自动息屏助手 v${version}

          ### 功能特性
          - 无操作自动息屏
          - 息屏前友好提醒（Toast 通知 + 倒计时）
          - 智能时段控制（仅下班后启用）
          - 一键息屏
          - 开机自启动
          - 精致设置界面

          ### 安装使用
          下载 \`小黑-自动息屏助手-v${version}.exe\`，双击运行即可。
          "@
          Set-Content -Path release_notes.md -Value $notes -Encoding utf8
          echo "notes_file=release_notes.md" >> $env:GITHUB_OUTPUT

      - name: Check build output
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          $exePath = "dist/小黑-自动息屏助手-v${version}.exe"
          if (Test-Path $exePath) {
            echo "Build artifact found: $exePath"
          } else {
            echo "ERROR: Build artifact not found at $exePath"
            Get-ChildItem dist/
            exit 1
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 小黑 - 自动息屏助手 v${{ steps.get_version.outputs.version }}
          body_path: ${{ steps.release_notes.outputs.notes_file }}
          draft: false
          prerelease: false
          files: |
            dist/小黑-自动息屏助手-v${{ steps.get_version.outputs.version }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
